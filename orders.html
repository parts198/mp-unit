  <script>
    const logBox = document.getElementById('logBox');
    const statusText = document.getElementById('statusText');
    const ordersSummary = document.getElementById('ordersSummary');
    const ordersTableWrapper = document.getElementById('ordersTableWrapper');
    const storeSelect = document.getElementById('storeSelect');
    const dateFrom = document.getElementById('dateFrom');
    const dateTo = document.getElementById('dateTo');
    const schemeFilter = document.getElementById('schemeFilter');
    const offerFilter = document.getElementById('offerFilter');
    const loadBtn = document.getElementById('loadBtn');

    let stores = [];

    function log(message, data) {
      const entry = document.createElement('div');
      entry.innerHTML = `<strong>[${new Date().toLocaleTimeString()}]</strong> ${message}`;
      if (data) {
        const details = document.createElement('details');
        details.innerHTML = `<summary>Детали</summary><pre>${JSON.stringify(data, null, 2)}</pre>`;
        entry.appendChild(details);
      }
      logBox.prepend(entry);
    }

    function isoDayStart(d) { return `${d}T00:00:00Z`; }
    function isoDayEnd(d) { return `${d}T23:59:59Z`; }

    function setDefaultDates() {
      const to = new Date();
      const from = new Date(Date.now() - 27 * 24 * 60 * 60 * 1000);
      dateFrom.value = from.toISOString().slice(0, 10);
      dateTo.value = to.toISOString().slice(0, 10);
    }

    function populateStores() {
      storeSelect.innerHTML = '';
      const optAll = document.createElement('option');
      optAll.value = 'all';
      optAll.textContent = 'Все магазины';
      storeSelect.appendChild(optAll);

      stores.forEach((s, idx) => {
        const opt = document.createElement('option');
        opt.value = String(idx);
        opt.textContent = s.name || `Store ${s.client_id}`;
        storeSelect.appendChild(opt);
      });
      storeSelect.value = 'all';
    }

    async function apiCall(store, path, body) {
      return await window.OzonCore.postJson('https://api-seller.ozon.ru' + path, body, {
        'Client-Id': store.client_id,
        'Api-Key': store.api_key,
      });
    }

    async function fetchPostingsPaged(store, path, schema, sinceIso, toIso) {
      const limit = 1000;
      let offset = 0;
      let out = [];
      for (let guard = 0; guard < 500; guard++) {
        const body = {
          filter: { since: sinceIso, to: toIso },
          limit,
          offset,
          with: { analytics_data: true, financial_data: true, products: true }
        };
        const data = await apiCall(store, path, body);
          const res = data?.result || data || {};
          const list = res?.postings || res?.items || res || [];

        out = out.concat(list.map((p) => ({ ...p, _schema: schema, _store: store.name || store.client_id })));
        const total = Number(data?.result?.total || data?.total || 0);
        offset += limit;
        if (!total || offset >= total || list.length < limit) break;
      }
      return out;
    }

    async function fetchPostingsForStore(store, fromDay, toDay) {
      const chunks = window.OzonCore.splitDateRange(fromDay, toDay, 7); // safe chunk size for time limits
      const combined = [];
      for (const ch of chunks) {
        const sinceIso = isoDayStart(ch.from);
        const toIso = isoDayEnd(ch.to);
        log(`${store.name}: период ${ch.from}…${ch.to}`);
        const scheme = schemeFilter.value;
        if (scheme === 'ALL' || scheme === 'FBS') {
          const fbs = await fetchPostingsPaged(store, '/v3/posting/fbs/list', 'FBS', sinceIso, toIso);
          combined.push(...fbs);
        }
        if (scheme === 'ALL' || scheme === 'FBO') {
          const fbo = await fetchPostingsPaged(store, '/v2/posting/fbo/list', 'FBO', sinceIso, toIso);
          
          try { log('DEBUG FBO count=' + ((fbo && fbo.length) ? fbo.length : 0)); } catch(e) {}
            combined.push(...fbo);
        }
      }
      // Deduplicate by posting number
      const map = new Map();
      combined.forEach((p) => {
        const key = p.posting_number || p.order_id || JSON.stringify([p._schema, p._store, p.created_at]);
        map.set(key, p);
      });
      return Array.from(map.values());
    }
function bestOfferId(x) {
  // Возвращаем ПОЛНЫЙ offer_id (никаких slice/substr)
  try {
    if (!x) return '';
    // если это строка
    if (typeof x === 'string' || typeof x === 'number') return String(x).trim();

    // прямые поля
    const direct =
      x.offer_id ?? x.offerId ?? x.offerID ??
      x?.offer?.offer_id ?? x?.offer?.id ??
      x.sku ?? x.sku_id ?? x.skuId ??
      x.article ?? x.artikul ?? x.articul;

    if (direct != null) {
      const s = String(direct).trim();
      if (s) return s;
    }

    // если прилетел объект с items/products/posting_items — берём первый
    const it =
      (Array.isArray(x.items) && x.items[0]) || (Array.isArray(x.products) && x.products[0]) || (Array.isArray(x.posting_items) && x.posting_items[0]) || null
        if (it) {
      const v = it.offer_id ?? it.offerId ?? it.offerID ?? it.sku ?? it.article ?? it.artikul ?? it.articul;
      const ss = String(v || '').trim();
      if (ss) return ss;
    }
    return '';
  } catch (e) {
    return '';
  }
}





    
      
      function postingItems(p) {
        // 1) товары из posting
        const candidates = [
          p.products,
          p.items,
          p.posting?.products,
          p.posting?.items,
          p.data?.products,
          p.data?.items,
        ].filter(Boolean);

        let arr = [];
        for (const c of candidates) {
          if (Array.isArray(c)) { arr = c; break; }
          if (c && Array.isArray(c.items)) { arr = c.items; break; }
          if (c && Array.isArray(c.products)) { arr = c.products; break; }
        }

        // 2) финансы из posting.financial_data
        const fin = p.financial_data || p.financialData || {};
        const finProducts =
          (Array.isArray(fin.products) ? fin.products : []) ||
          (Array.isArray(fin.items) ? fin.items : []);

        const finByPid = new Map();
        for (const fp of finProducts) {
          const pid = String(fp.product_id ?? fp.productId ?? fp.id ?? '');
          if (pid) finByPid.set(pid, fp);
        }

        // 3) join по product_id (fallback: по индексу)
        return mergePricesIntoItems((arr || []).map((it, idx) => {
          const offer_id = bestOfferId(it);

const product_id = String(
            it.product_id ?? it.productId ?? it.product?.id ?? it.product?.product_id ?? ''
          );

          const name = it.name || it.product_name || it.productName || it.title || '';
          const quantity = Number(it.quantity ?? it.qty ?? it.count ?? it.amount ?? 0) || 0;

          let fp = (product_id && finByPid.get(product_id)) || null;
          if (!fp && finProducts[idx]) fp = finProducts[idx]; // fallback по позиции

          const price = fp?.price ?? fp?.item_price ?? it.price ?? it.item_price ?? null;
          const customer_price = fp?.customer_price ?? fp?.customerPrice ?? null;
          const old_price = fp?.old_price ?? fp?.oldPrice ?? null;
          const payout = fp?.payout ?? null;
          const commission_amount = fp?.commission_amount ?? fp?.commissionAmount ?? null;
          const total_discount_value = fp?.total_discount_value ?? fp?.totalDiscountValue ?? null;

          return {
            offer_id: String(offer_id || ''),
            product_id,
            name,
            quantity,
            fin: fp || null,
            price,
            customer_price,
            old_price,
            payout,
            commission_amount,
            total_discount_value,
            raw: it
          };
        }), window.__PRICES_BY_OFFER__ || new Map()).filter(x => x.offer_id || x.name || x.product_id);
      }

        function getPostingPrice(posting) {
          const items = postingItems(posting) || [];
          let sum = 0;
          for (const line of items) {
            const qty = Math.max(1, asNum(line?.quantity ?? line?.count ?? 1, 1));
            const price = getPriceForLine(line);
            sum += asNum(price) * qty;
          }
          return sum;
        }


      function rub(x) {
        const n = Number(x);
        if (!Number.isFinite(n)) return '—';
        return n.toLocaleString('ru-RU') + ' ₽';
      }

      function n0(x) {
        const n = Number(x);
        return Number.isFinite(n) ? n : 0;
      }

      async function fetchPricesByOfferIds(store, offerIds) {
        // /v5/product/info/prices (как в dashboard.html)
        const uniq = Array.from(new Set((offerIds || []).map(x => String(x || '').trim()).filter(Boolean)));
        const chunkSize = 1000;

        const map = new Map();

        for (let i = 0; i < uniq.length; i += chunkSize) {
          const chunk = uniq.slice(i, i + chunkSize);

          const body = {
            cursor: '',
            filter: { offer_id: chunk, visibility: 'ALL' },
            limit: chunk.length
          };

          const data = await apiCall(store, '/v5/product/info/prices', body);

          const items = Array.isArray(data?.items) ? data.items
                     : Array.isArray(data?.result?.items) ? data.result.items
                     : [];

          for (const it of items) {
            const id = String(it.offer_id || it.offerId || '').trim();
            if (!id) continue;

            // В v5 цены внутри it.price (объект)
            const pr = (it && typeof it.price === 'object' && it.price) ? it.price : (it?.raw?.price || {});
            const your = pr?.marketing_seller_price ?? pr?.marketingSellerPrice ?? null;
            const cur  = pr?.price ?? pr?.current_price ?? pr?.currentPrice ?? null;

            const rec = {
              offer_id: id,

              // для отображения
              yourPrice: your,
              currentPrice: cur,
              oldPrice: pr?.old_price ?? pr?.oldPrice ?? null,
              marketingPrice: pr?.marketing_seller_price ?? pr?.marketingSellerPrice ?? null,
              minPrice: pr?.min_price ?? pr?.minPrice ?? null,

              // для расчётов расходов
              commissions: it.commissions || null,
              current_tariff: it.current_tariff || null,

              raw: it
            };
            map.set(id, rec);
            const idZ = id.replace(/^0+/, '');
            if (idZ && idZ !== id) map.set(idZ, rec);
          }
        }

        return map;
      }




      function mergePricesIntoItems(items, pricesMap) {
        if (!pricesMap || !items) return items || [];
        return (items || []).map(it => {
          const k = String(bestOfferId(it) || it.offer_id || '').trim();
          const kZ = k.replace(/^0+/, '');
          const p = k ? (pricesMap.get(k) || (kZ && pricesMap.get(kZ)) || null) : null;
          return { ...it, priceCard: p };
        });
      }




      let __OZON_METRICS_CACHE = null;





      function getOfferMetricsMap(x) {

  if (__OZON_METRICS_CACHE !== null) return __OZON_METRICS_CACHE;

  let parsed = null;
  try {
    const raw = localStorage.getItem('ozon_offer_metrics_v1');
    parsed = raw ? JSON.parse(raw) : null;
  } catch (e) {
    parsed = null;
  }

  const map = {};

  const put = (key, rec) => {
    const k = String(key || '').trim();
    if (!k) return;
    map[k] = rec || {};
    const k2 = k.replace(/^0+/, '');
    if (k2 && k2 !== k && map[k2] == null) map[k2] = rec || {};
  };

  const ingestRec = (rec, keyHint) => {
    if (!rec || typeof rec !== 'object') return;
    const key = rec.offer_id ?? rec.offerId ?? rec.offerid ?? rec.sku ?? rec.id ?? rec.article ?? rec.artikul ?? rec.vendor_code ?? rec.vendorCode ?? keyHint;
    put(key, rec);
  };

  if (Array.isArray(parsed)) {
    for (const rec of parsed) ingestRec(rec);
  } else if (parsed && typeof parsed === 'object') {
    if (Array.isArray(parsed.items)) {
      for (const rec of parsed.items) ingestRec(rec);
    } else if (Array.isArray(parsed.data)) {
      for (const rec of parsed.data) ingestRec(rec);
    } else {
      // либо уже словарь {offerId: rec}, либо смешанная структура
      for (const [k, v] of Object.entries(parsed)) {
        if (v && typeof v === 'object' && (v.offer_id || v.offerId || v.sku || v.id || v.article || v.artikul)) {
          ingestRec(v);
        } else {
          put(k, v);
        }

        function resetOfferMetricsCache() {
          __OZON_METRICS_CACHE = null;
        }
      }
    }
  }

  __OZON_METRICS_CACHE = map;
  return __OZON_METRICS_CACHE;





      }




      
      
/* ===== METRICS_ALIAS_INDEX_V1 ===== */
let __OZON_METRICS_ALIAS_MAP = null;

function __normMetricKey(x) {
  const t = String(x ?? '').trim();
  if (!t) return '';
  // убираем пробелы, сохраняем регистр как есть + сделаем алиасы позже
  const n = t.replace(/\s+/g, '');
  return n;
}

function getOfferMetricsAliasMap() {
  if (__OZON_METRICS_ALIAS_MAP !== null) return __OZON_METRICS_ALIAS_MAP;

  const mp = (typeof getOfferMetricsMap === 'function') ? (getOfferMetricsMap() || {}) : {};
  const alias = {};

  function put(k, rec) {
    try {
      const kk = __normMetricKey(k);
      if (!kk) return;
      if (!alias[kk]) alias[kk] = rec;

      // алиас без ведущих нулей
      const no0 = kk.replace(/^0+/, '');
      if (no0 && no0 !== kk && !alias[no0]) alias[no0] = rec;

      // алиасы по регистру
      const up = kk.toUpperCase();
      const low = kk.toLowerCase();
      if (up && !alias[up]) alias[up] = rec;
      if (low && !alias[low]) alias[low] = rec;
    } catch(e) {}
  }

  for (const [k, rec] of Object.entries(mp)) {
    if (!rec || typeof rec !== 'object') continue;

    // ключ словаря
    put(k, rec);

    // возможные поля идентификаторов внутри записи
    put(rec.offer_id, rec);
    put(rec.offerId, rec);
    put(rec.offerid, rec);
    put(rec.sku, rec);
    put(rec.id, rec);
    put(rec.article, rec);
    put(rec.artikul, rec);
    put(rec.vendor_code, rec);
    put(rec.vendorCode, rec);
  }

  __OZON_METRICS_ALIAS_MAP = alias;
  return __OZON_METRICS_ALIAS_MAP;
}
/* ===== /METRICS_ALIAS_INDEX_V1 ===== */


/* ===== METRICS_REINDEX_V2 ===== */
let __OZON_METRICS_BY_ORDER_OFFERID = null;   // ключ = offer_id как в заказе (в т.ч. с ведущими нулями)
let __OZON_METRICS_BY_ANY_KEY = null;         // ключ = offer_id/sku/article/vendor_code из метрики + алиасы

function __normKey(x) {
  const t = String(x ?? '').trim();
  if (!t) return '';
  return t.replace(/\s+/g, '');
}

function __put(mp, k, rec) {
  try {
    const kk = __normKey(k);
    if (!kk) return;
    if (!mp[kk]) mp[kk] = rec;

    const no0 = kk.replace(/^0+/, '');
    if (no0 && no0 !== kk && !mp[no0]) mp[no0] = rec;

    const up = kk.toUpperCase();
    const low = kk.toLowerCase();
    if (up && !mp[up]) mp[up] = rec;
    if (low && !mp[low]) mp[low] = rec;
  } catch(e) {}
}

function resetOfferMetricsCache() {
  try { __OZON_METRICS_CACHE = null; } catch(e) {}
  __OZON_METRICS_BY_ORDER_OFFERID = null;
  __OZON_METRICS_BY_ANY_KEY = null;
}

function getMetricsIndexV2() {
  if (__OZON_METRICS_BY_ORDER_OFFERID && __OZON_METRICS_BY_ANY_KEY) {
    return {byOrder: __OZON_METRICS_BY_ORDER_OFFERID, byAny: __OZON_METRICS_BY_ANY_KEY};
  }

  const base = (typeof getOfferMetricsMap === 'function') ? (getOfferMetricsMap() || {}) : {};
  const byAny = {};
  const byOrder = {};

  for (const [k, rec] of Object.entries(base)) {
    if (!rec || typeof rec !== 'object') continue;

    // 1) индекс "как в метриках": любые поля идентификаторов
    __put(byAny, k, rec);
    __put(byAny, rec.offer_id, rec);
    __put(byAny, rec.offerId, rec);
    __put(byAny, rec.offerid, rec);
    __put(byAny, rec.sku, rec);
    __put(byAny, rec.id, rec);
    __put(byAny, rec.article, rec);
    __put(byAny, rec.artikul, rec);
    __put(byAny, rec.vendor_code, rec);
    __put(byAny, rec.vendorCode, rec);

    // 2) индекс "как в заказах":
    // ВАЖНО: если в метрике есть поле orderOfferId / order_offer_id — используем его.
    // Если нет — оставим как есть (byOrder будет неполный, зато byAny покроет).
    __put(byOrder, rec.order_offer_id, rec);
    __put(byOrder, rec.orderOfferId, rec);
  }

  __OZON_METRICS_BY_ORDER_OFFERID = byOrder;
  __OZON_METRICS_BY_ANY_KEY = byAny;
  return {byOrder, byAny};
}
/* ===== /METRICS_REINDEX_V2 ===== */

function metricByOfferId(offer_id) {
        const m = getOfferMetricsMap();
        const raw = String(offer_id || '').trim();
        if (!raw) return null;

        // 1) прямой ключ
        if (m[raw]) return m[raw];

        // 2) нормализация пробелов/служебных
        const norm = raw.replace(/\s+/g, '').trim();
        
        // METRIC_LOOKUP_STRIP_LEADING_ZEROS_V1: ключ без ведущих нулей
        const no0 = norm.replace(/^0+/, '');
        if (no0 && m[no0]) return m[no0];
if (m[norm]) return m[norm];

        // 3) регистр
        const up = norm.toUpperCase();

          const t1 = FBO_AVG_DELIVERY_TARIFF_TABLE[FBO_AVG_DELIVERY_TARIFF_TABLE.length-1];
          if (h <= t0.h) return t0;
          if (h >= t1.h) return t1;
          // exact match
          for (const row of FBO_AVG_DELIVERY_TARIFF_TABLE) {
            if (row.h === h) return row;
          }
          // fallback: closest lower
          let best = t0;
          for (const row of FBO_AVG_DELIVERY_TARIFF_TABLE) {
            if (row.h <= h) best = row;
            else break;
          }
          return best;

          const resp = await fetch(url, {
            method: "POST",
            headers: {
              "Client-Id": creds.clientId,
              "Api-Key": creds.apiKey,
              "Content-Type": "application/json",
            },
            body: JSON.stringify(payload || {})
          });
          const txt = await resp.text();
          let js = {};
          try { js = txt ? JSON.parse(txt) : {}; } catch(e) { js = {raw: txt}; }

          if (mem && mem.ts && (now - mem.ts) < __FBO_AVG_DELIVERY_TTL_MS && Number.isFinite(mem.hours) && mem.hours > 0) {
            return mem.hours;
          }
          try {
            const raw = localStorage.getItem(key);
            if (raw) {
              const obj = JSON.parse(raw);
              if (obj && obj.ts && (now - obj.ts) < __FBO_AVG_DELIVERY_TTL_MS && Number.isFinite(obj.hours) && obj.hours > 0) {
                __FBO_AVG_DELIVERY_CACHE[key] = obj;
                return obj.hours;
              }
            }
          } catch (e) {}
          return null;
        }

let __hourlyChart = null;

function __hourFromPosting(p) {
  try {
    const ts = String(p?.created_at || p?.in_process_at || p?.shipment_date || p?.order_created_at || p?.createdAt || '').trim();
    if (!ts) return null;

    // Быстрый путь: ISO "YYYY-MM-DDTHH:MM:SS"
    const m = ts.match(/T(\d{2}):(\d{2}):(\d{2})/);
    if (m) return Number(m[1]);

    // Fallback: Date parse
    const d = new Date(ts);
    if (!isNaN(d.getTime())) return d.getHours();

    return null;
  } catch (e) {
    return null;
  }
}


/* ===== CLUSTER_ANALYTICS_V2 JS ===== */
function escHtml(s) {
  const t = String(s ?? '');
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtRub(x) {
  try {
    const n = Number(x||0);
    return n.toLocaleString('ru-RU', { style:'currency', currency:'RUB', maximumFractionDigits:0 });
  } catch(e) { return String(x||0); }
}

function sumPostingQtyAndRevenue(p) {
  try {
    const items = (typeof postingItems === 'function') ? (postingItems(p) || []) : (p?.products || p?.items || []);
    let qty = 0;
    let rev = 0;
    for (const it of items) {
      const q = Number(it?.quantity ?? it?.count ?? 1) || 1;
      const price = Number(it?.price ?? it?.sale_price ?? it?.selling_price ?? it?.item_price ?? it?.product_price ?? 0) || 0;
      qty += q;
      rev += price * q;
    }
    return {qty, rev};
  } catch(e) {
    return {qty:0, rev:0};
  }
}

function buildClusterAgg(postings, schemaNeed) {
  const mp = new Map();
  for (const p of (postings||[])) {
    const schema = String(p?._schema || p?.schema || '').toUpperCase();
    if (schemaNeed && schema !== schemaNeed) continue;

    const cf = (p?._cluster_from ?? getClusterFromPosting(p) ?? '—');
    const ct = (p?._cluster_to   ?? getClusterToPosting(p)   ?? '—');
    const key = String(cf) + " → " + String(ct);

    const m = sumPostingQtyAndRevenue(p);
    const cur = mp.get(key) || {key, postings:0, qty:0, rev:0};
    cur.postings += 1;
    cur.qty += (m.qty||0);
    cur.rev += (m.rev||0);
    mp.set(key, cur);
  }
  return Array.from(mp.values()).sort((a,b) => (b.postings - a.postings) || (b.qty - a.qty) || (b.rev - a.rev));
}

function renderClusterTable(elId, rows) {
  const el = document.getElementById(elId);
  if (!el) return;

  if (!rows || !rows.length) {
    el.innerHTML = '<div style="opacity:.7;">Нет данных по кластерам в выбранном периоде.</div>';
    return;
  }

  const body = rows.map(r => (
    '<tr>' +
      '<td>' + escHtml(r.key) + '</td>' +
      '<td style="text-align:right;">' + (r.postings||0) + '</td>' +
      '<td style="text-align:right;">' + (r.qty||0) + '</td>' +
      '<td style="text-align:right;">' + escHtml(fmtRub(r.rev||0)) + '</td>' +
    '</tr>'
  )).join('');

  el.innerHTML =
    '<table class="table" style="width:100%; font-size:13px;">' +
      '<thead><tr>' +
        '<th>Маршрут</th>' +
        '<th style="text-align:right;">Отправлений</th>' +
        '<th style="text-align:right;">Штук</th>' +
        '<th style="text-align:right;">Сумма</th>' +
      '</tr></thead>' +
      '<tbody>' + body + '</tbody>' +
    '</table>';
}

function renderClusterAnalytics(postings) {
  try {
    const fbo = buildClusterAgg(postings, 'FBO');
    const fbs = buildClusterAgg(postings, 'FBS');
    renderClusterTable('clusterFboTable', fbo);
    renderClusterTable('clusterFbsTable', fbs);
  } catch(e) {
    console.warn('renderClusterAnalytics failed', e);
  }
}

function renderHourlyChart(postings) {
  const canvas = document.getElementById('hourlyChart');
  if (!canvas || typeof Chart === 'undefined') return;

  const hours = Array.from({length:24}, (_,i)=>i);
  const labels = hours.map(h => String(h).padStart(2,'0') + ':00');

  const cnt = new Array(24).fill(0);
  const amount = new Array(24).fill(0);

  for (const p of (postings || [])) {
    const h = __hourFromPosting(p);
    if (h == null || h < 0 || h > 23) continue;
    cnt[h] += 1;

    // сумма заказа: используем существующую функцию, которая уже у вас есть в orders.html
    try {
      if (typeof postingPriceForRow === 'function') {
        amount[h] += Number(postingPriceForRow(p) || 0);
      } else if (typeof getPostingPrice === 'function') {
        amount[h] += Number(getPostingPrice(p) || 0);
      }
    } catch (e) {}
  }

  if (__hourlyChart) __hourlyChart.destroy();
  __hourlyChart = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'Кол-во заказов',
          type: 'bar',
          data: cnt,
          yAxisID: 'y',
          borderWidth: 1
        },
        {
          label: 'Сумма заказов, ₽',
          type: 'line',
          data: amount,
          yAxisID: 'y1',
          tension: 0.35,
          pointRadius: 0,
          pointHitRadius: 12,
          fill: false
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      scales: {
        y: { title: { display: true, text: 'Заказы' } },
        y1: { position: 'right', grid: { drawOnChartArea: false }, title: { display: true, text: '₽' } }
      },
      plugins: {
        legend: { display: true }
      }
    }
  });
}
