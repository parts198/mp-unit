<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Восстановление пароля — mp-unit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial; background:#f6f7fb; margin:0; color:#111}
    .wrap{max-width:520px; margin:0 auto; padding:24px}
    .card{background:#fff; border:1px solid #e8e8ee; border-radius:14px; padding:18px;
      box-shadow:0 8px 30px rgba(0,0,0,.04); margin-top:40px}
    h1{margin:0 0 10px 0; font-size:20px}
    .muted{color:#666; font-size:13px}
    label{display:block; font-size:12px; color:#555; margin-top:12px}
    input{width:100%; padding:10px 12px; margin-top:6px; border:1px solid #ddd; border-radius:10px; font-size:14px; background:#fff}
    .actions{display:flex; gap:10px; justify-content:space-between; align-items:center; margin-top:14px; flex-wrap:wrap}
    .btn{padding:10px 12px; border:0; border-radius:10px; background:#0b5cff; color:#fff; font-weight:600; cursor:pointer}
    .btn2{padding:10px 12px; border:1px solid #ddd; border-radius:10px; background:#fff; cursor:pointer; text-decoration:none; color:#111}
    .msg{margin-top:10px; color:#b00020; font-size:13px; min-height:18px}
    .ok{color:#0a7a2f}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Восстановление пароля</h1>
      <div class="muted">Введите email — мы отправим ссылку для сброса пароля.</div>

      <div id="msg" class="msg"></div>

      <label>Email</label>
      <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />

      <div class="actions">
        <a class="btn2" href="/login.html">← Войти</a>
        <button class="btn" id="sendBtn" type="button">Отправить ссылку</button>
      </div>
    </div>
  </div>

  <script src="/auth.js"></script>
  <script>
    const msg = document.getElementById("msg");
    const sendBtn = document.getElementById("sendBtn");

    sendBtn.addEventListener("click", async () => {
      msg.classList.remove("ok");
      msg.textContent = "";

      const email = (document.getElementById("email").value || "").trim().toLowerCase();
      if (!email) { msg.textContent = "Введите email."; return; }

      const res = await apiFetch("/auth/password-reset/request/", {
        method: "POST",
        body: { email }
      });

      const data = await res.json().catch(()=> ({}));
      if (!res.ok) {
        msg.textContent = data.detail || JSON.stringify(data) || ("Ошибка: " + res.status);
        return;
      }

      msg.classList.add("ok");
      msg.textContent = "Если такой email зарегистрирован — письмо отправлено. Проверьте почту.";
    });
  </script>
</body>
</html>
