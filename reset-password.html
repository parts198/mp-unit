<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Сброс пароля — mp-unit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial; background:#f6f7fb; margin:0; color:#111}
    .wrap{max-width:520px; margin:0 auto; padding:24px}
    .card{background:#fff; border:1px solid #e8e8ee; border-radius:14px; padding:18px;
      box-shadow:0 8px 30px rgba(0,0,0,.04); margin-top:40px}
    h1{margin:0 0 10px 0; font-size:20px}
    .muted{color:#666; font-size:13px}
    label{display:block; font-size:12px; color:#555; margin-top:12px}
    input{width:100%; padding:10px 12px; margin-top:6px; border:1px solid #ddd; border-radius:10px; font-size:14px; background:#fff}
    .actions{display:flex; gap:10px; justify-content:space-between; align-items:center; margin-top:14px; flex-wrap:wrap}
    .btn{padding:10px 12px; border:0; border-radius:10px; background:#0b5cff; color:#fff; font-weight:600; cursor:pointer}
    .btn2{padding:10px 12px; border:1px solid #ddd; border-radius:10px; background:#fff; cursor:pointer}
    .msg{margin-top:10px; color:#b00020; font-size:13px; min-height:18px}
    .ok{color:#0a7a2f}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Сброс пароля</h1>
      <div class="muted">Придумайте новый пароль (минимум 8 символов).</div>

      <div id="msg" class="msg"></div>

      <label>Новый пароль</label>
      <input id="p1" type="password" placeholder="Минимум 8 символов" autocomplete="new-password" />

      <label>Новый пароль ещё раз</label>
      <input id="p2" type="password" placeholder="Повторите пароль" autocomplete="new-password" />

      <div class="actions">
        <button class="btn2" id="toggleBtn" type="button">👁 Показать</button>
        <button class="btn" id="saveBtn" type="button">Сменить пароль</button>
      </div>

      <div class="muted" style="margin-top:10px">
        После успешного сброса можно <a href="/login.html">войти</a>.
      </div>
    </div>
  </div>

  <script src="/auth.js"></script>
  <script>
    const msg = document.getElementById("msg");
    const saveBtn = document.getElementById("saveBtn");
    const toggleBtn = document.getElementById("toggleBtn");

    function qp(name){
      const u = new URL(window.location.href);
      return (u.searchParams.get(name) || "").trim();
    }

    const uid = qp("uid");
    const token = qp("token");

    if (!uid || !token) {
      msg.textContent = "Ссылка некорректна: нет uid/token.";
    }

    toggleBtn.addEventListener("click", () => {
      const a = document.getElementById("p1");
      const b = document.getElementById("p2");
      const next = (a.type === "password") ? "text" : "password";
      a.type = next; b.type = next;
    });

    saveBtn.addEventListener("click", async () => {
      msg.classList.remove("ok");
      msg.textContent = "";

      if (!uid || !token) return;

      const p1 = (document.getElementById("p1").value || "").trim();
      const p2 = (document.getElementById("p2").value || "").trim();

      if (!p1 || !p2) { msg.textContent = "Заполните оба поля пароля."; return; }
      if (p1.length < 8) { msg.textContent = "Пароль должен быть минимум 8 символов."; return; }
      if (p1 !== p2) { msg.textContent = "Пароли не совпадают."; return; }

      const res = await apiFetch("/auth/password-reset/confirm/", {
        method: "POST",
        body: { uid, token, new_password: p1 }
      });

      const data = await res.json().catch(()=> ({}));
      if (!res.ok) {
        msg.textContent = data.detail || JSON.stringify(data) || ("Ошибка: " + res.status);
        return;
      }

      msg.classList.add("ok");
      msg.textContent = "Пароль изменён. Теперь можно войти.";
      document.getElementById("p1").value = "";
      document.getElementById("p2").value = "";
    });
  </script>
</body>
</html>
